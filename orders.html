<div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-20 hidden lg:hidden"></div>
<script>
  const s=document.getElementById('sidebar'),t=document.getElementById('sidebarToggle'),o=document.getElementById('sidebarOverlay');
  t.addEventListener('click',()=>{const open=!s.classList.contains('-translate-x-full');s.classList.toggle('-translate-x-full',open);o.classList.toggle('hidden',open);t.setAttribute('aria-expanded',String(!open))});
  o.addEventListener('click',()=>{s.classList.add('-translate-x-full');o.classList.add('hidden');t.setAttribute('aria-expanded','false')});
</script>
