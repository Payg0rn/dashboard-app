const STATUS_CYCLE = ['not-started', 'in-progress', 'covered', 'needs-recap']
const STATUS_LABEL = { 'not-started':'Not started', 'in-progress':'In progress', 'covered':'Covered', 'needs-recap':'Needs recap' }
const STATUS_CHIP = {

function todayStr() { return new Date().toISOString().slice(0,10) }
function daysUntil(d) { const t=new Date(); t.setHours(0,0,0,0); return Math.ceil((new Date(d)-t)/86400000) }
function daysSince(d) { if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.floor((t-new Date(d))/86400000) }

function loadState(saved) {
  const src = saved || JSON.parse(localStorage.getItem('revision-hub')||'{}')
  const st = src.topics || {}
  const topics = {}
  for (const s of SUBJ_KEYS)
    topics[s] = CONFIG[s].topics.map(t => ({ ...t, ...(st[t.id]||{}) }))
  return { topics, papers: src.papers || [] }
}
let S = loadState()

function serialise() {
  const flat = {}
  for (const s of SUBJ_KEYS)
    for (const t of S.topics[s])
      flat[t.id] = { status:t.status, lastCovered:t.lastCovered, conf:t.conf }
  return { topics:flat, papers:S.papers }
}

function saveState() {
  const payload = serialise()
  localStorage.setItem('revision-hub', JSON.stringify(payload))
  pushToServer(payload)
}

// ── Cloud sync ─────────────────────────────────────────

function setSyncDot(state) {
  const dot = document.getElementById('sync-dot')
  const lbl = document.getElementById('sync-status')
  if (!dot) return
  const map = {
    syncing: ['bg-amber-400',  'syncing…'],
    ok:      ['bg-emerald-400','synced'],
    error:   ['bg-red-500',    'sync failed'],
    offline: ['bg-slate-600',  'offline'],
  }
  const [cls, txt] = map[state] || map.offline
  dot.className = `w-1.5 h-1.5 rounded-full ${cls}`
  lbl.textContent = txt
}

async function pushToServer(payload) {
  setSyncDot('syncing')
  try {
    const r = await fetch('/api/revision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
    setSyncDot(r.ok ? 'ok' : 'error')
    if (!r.ok) console.error('Revision sync push failed:', r.status, await r.text())
  } catch (e) { setSyncDot('error'); console.error('Revision sync push error:', e) }
}

async function syncFromServer() {
  setSyncDot('syncing')
  try {
    const r = await fetch('/api/revision')
    if (!r.ok) { setSyncDot('error'); return }
    const remote = await r.json()

    if (!remote || !remote.topics) {
      // Server has no data yet — push current local state up so other devices can pull it
      pushToServer(serialise())
      return
    }

    // Server has data — use it as source of truth
    localStorage.setItem('revision-hub', JSON.stringify(remote))
    S = loadState(remote)
    render()
    setSyncDot('ok')
  } catch (e) { setSyncDot('error'); console.error('Revision sync pull error:', e) }
}

// ── Mutations ──────────────────────────────────────────

function cycleStatus(subj, id) {
  const t = S.topics[subj].find(t=>t.id===id); if(!t) return
  const i = STATUS_CYCLE.indexOf(t.status)
  t.status = STATUS_CYCLE[(i+1)%STATUS_CYCLE.length]
  if (t.status==='covered') t.lastCovered = todayStr()
  saveState(); render()
}
function setConf(subj, id, val) {
  const t = S.topics[subj].find(t=>t.id===id); if(!t) return
  t.conf = t.conf===val ? null : val
  saveState(); render()
}
function markRecapped(subj, id) {
  const t = S.topics[subj].find(t=>t.id===id); if(!t) return
  t.lastCovered = todayStr()
  if (t.status==='needs-recap') t.status = 'covered'
  saveState(); render()
}
function addPaper() {
  const get = id => document.getElementById(id).value.trim()
  const date=get('pf-date'), subj=get('pf-subj'), paper=get('pf-paper'), score=get('pf-score'), grade=get('pf-grade')
  if (!date||!subj||!paper) return
  S.papers.unshift({ id:'p'+Date.now(), date, subj, paper, score, grade })
  saveState(); render()
  ;['pf-paper','pf-score','pf-grade'].forEach(id=>document.getElementById(id).value='')
}
function deletePaper(id) {
  S.papers = S.papers.filter(p=>p.id!==id)
  saveState(); render()
}

// ── Helpers ───────────────────────────────────────────

function confHtml(subj, id, val) {
  return [1,2,3,4,5].map(n =>
    `<span class="cdot w-2 h-2 rounded-sm inline-block ${val!=null&&n<=val?'bg-blue-400':'bg-slate-700'}" onclick="setConf('${subj}','${id}',${n})" title="Confidence ${n}/5"></span>`
  ).join('')
}

function allTopicsFlat() {
  return SUBJ_KEYS.flatMap(s => S.topics[s].map(t=>({...t,subj:s})))
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function renderCountdown() {
  const sorted = [...EXAM_DATES].sort((a,b)=>new Date(a.date)-new Date(b.date))
  const nearestDate = sorted[0].date
  document.getElementById('panel-countdown').innerHTML = EXAM_DATES.map(e => {
    const d = daysUntil(e.date)
    const [numCls, borderCls, bgCls] =
      d<=3  ? ['text-red-400',    'border-red-500/50',    'bg-red-900/20'] :
      d<=7  ? ['text-amber-400',  'border-amber-500/50',  'bg-amber-900/20'] :
      d<=14 ? ['text-yellow-400', 'border-yellow-500/40', 'bg-yellow-900/10'] :
              ['text-blue-400',   'border-blue-900/40',   'bg-[#111827]']
    const nearest = e.date===nearestDate
    return `<div class="rounded-xl border ${borderCls} ${bgCls} p-3 relative">
      ${nearest?'<span class="absolute top-2 right-2 text-[9px] font-mono text-amber-400 uppercase tracking-widest">next</span>':''}
      <div class="text-[11px] font-mono text-slate-400 leading-tight pr-8">${e.label}</div>
      <div class="text-4xl font-bold font-mono ${numCls} leading-none mt-1">${d}</div>
      <div class="text-[10px] font-mono text-slate-500 mt-1">${d===1?'day':'days'} · ${new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
    </div>`
  }).join('')
}

function renderAgenda() {
  const today = todayStr()
  const all = allTopicsFlat()

  // Most overdue: needs-recap first (oldest), then covered >2d ago (oldest)
  const needsRecap = all.filter(t=>t.status==='needs-recap').sort((a,b)=>(a.lastCovered||'0')<(b.lastCovered||'0')?-1:1)
  const overdue    = all.filter(t=>t.status==='covered' && daysSince(t.lastCovered)>2).sort((a,b)=>(a.lastCovered||'0')<(b.lastCovered||'0')?-1:1)
  const recapTarget = needsRecap[0] || overdue[0]

  // Next new topic per subject
  const nextNew = {}
  for (const s of SUBJ_KEYS) {
    const topics = S.topics[s]
    nextNew[s] = topics.find(t=>t.status==='in-progress') || topics.find(t=>t.status==='not-started')
  }

  // Balance: has each subject been touched today?
  const touchedToday = {}
  for (const s of SUBJ_KEYS)
    touchedToday[s] = S.topics[s].some(t=>t.lastCovered===today)

  const allBalanced = SUBJ_KEYS.every(s=>touchedToday[s])
  const missingSubjs = SUBJ_KEYS.filter(s=>!touchedToday[s]).map(s=>CONFIG[s].abbr)

  const recapRow = recapTarget
    ? `<div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-amber-400 flex-shrink-0"></span>
        <span class="text-xs font-mono font-semibold text-amber-300">RECAP</span>
        <span class="text-xs font-mono text-slate-300">${recapTarget.name}</span>
        <span class="text-[10px] font-mono text-slate-500">${CONFIG[recapTarget.subj].abbr}</span>
        ${recapTarget.lastCovered?`<span class="text-[10px] font-mono text-slate-600">${daysSince(recapTarget.lastCovered)}d ago</span>`:''}
        <button onclick="markRecapped('${recapTarget.subj}','${recapTarget.id}')" class="ml-auto text-[10px] font-mono text-emerald-400 hover:text-emerald-300 border border-emerald-800/40 px-2 py-0.5 rounded">Done ✓</button>
       </div>`
    : `<div class="text-xs font-mono text-emerald-400">✓ No overdue recaps</div>`

  const nextRows = SUBJ_KEYS.map(s => {
    const t = nextNew[s]
    if (!t) return `<div class="flex items-center gap-2"><span class="text-[10px] font-mono px-1.5 py-0.5 rounded border ${SUBJ_BADGE[s]}">${CONFIG[s].abbr}</span><span class="text-xs font-mono text-emerald-400">All topics covered</span></div>`
    return `<div class="flex items-center gap-2">
      <span class="text-[10px] font-mono px-1.5 py-0.5 rounded border ${SUBJ_BADGE[s]}">${CONFIG[s].abbr}</span>
      <span class="text-xs font-mono text-slate-300">${t.name}</span>
      ${t.spec?`<span class="text-[10px] font-mono text-slate-600">${t.spec}</span>`:''}
      <span class="ml-auto text-[10px] font-mono px-1.5 py-0.5 rounded border ${STATUS_CHIP[t.status]}">${STATUS_LABEL[t.status]}</span>
    </div>`
  }).join('')

  const balanceRow = allBalanced
    ? `<div class="text-[10px] font-mono text-emerald-400">✓ All 3 subjects balanced today</div>`
    : `<div class="text-[10px] font-mono text-amber-400">⚠ Not yet covered today: ${missingSubjs.join(', ')}</div>`

  document.getElementById('panel-agenda').innerHTML = `
    <div class="flex items-center gap-2 mb-2">
      <span class="text-xs font-mono font-bold text-slate-200 uppercase tracking-wider">Today's Session</span>
      <span class="text-[10px] font-mono text-slate-600">${new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</span>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-6 gap-y-1.5">
      <div class="space-y-1.5">
        <div class="text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Recap priority</div>
        ${recapRow}
      </div>
      <div class="space-y-1.5">
        <div class="text-[10px] font-mono text-slate-500 uppercase tracking-wider mb-1">Next topics</div>
        ${nextRows}
      </div>
    </div>
    <div class="mt-2 pt-2 border-t border-slate-800">${balanceRow}</div>`
}

function renderProgress() {
  const ORDER = ['not-started','in-progress','covered','needs-recap']
  const GROUP_LABEL = { 'not-started':'Not started', 'in-progress':'In progress', 'covered':'Covered', 'needs-recap':'Needs recap' }

  document.getElementById('panel-progress').innerHTML = SUBJ_KEYS.map(s => {
    const topics = S.topics[s]
    const total   = topics.length
    const covered = topics.filter(t=>t.status==='covered').length
    const pct     = total ? Math.round(covered/total*100) : 0
    const outstanding = topics.filter(t=>t.status==='not-started'||t.status==='in-progress').length
    const needsRecap  = topics.filter(t=>t.status==='needs-recap').length
    const c = SUBJ_COLOR[s]

    // Progress bar
    const barColor = c==='blue'?'bg-blue-500':c==='violet'?'bg-violet-500':'bg-emerald-500'
    const borderColor = c==='blue'?'border-blue-900/40':c==='violet'?'border-violet-900/40':'border-emerald-900/40'
    const headColor = c==='blue'?'text-blue-400':c==='violet'?'text-violet-400':'text-emerald-400'

    // Group topics by status
    const groups = ORDER.map(st => {
      const ts = topics.filter(t=>t.status===st)
      if (!ts.length) return ''
      const chips = ts.map(t =>
        `<span class="chip inline-flex items-center gap-1 px-1.5 py-0.5 rounded border text-[11px] font-mono ${STATUS_CHIP[t.status]}" onclick="cycleStatus('${s}','${t.id}')" title="${STATUS_LABEL[t.status]} → click to cycle\n${t.lastCovered?'Last: '+t.lastCovered:''}">
          ${t.spec?`<span class="opacity-40 text-[9px]">${t.spec}</span>`:''}
          ${t.name}
        </span>`
      ).join('')
      return `<div class="mb-1.5">
        <div class="text-[9px] font-mono text-slate-600 uppercase tracking-widest mb-1">${GROUP_LABEL[st]} (${ts.length})</div>
        <div class="flex flex-wrap gap-1">${chips}</div>
      </div>`
    }).join('')

    return `<div class="bg-[#111827] border ${borderColor} rounded-xl p-3">
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-mono font-bold ${headColor}">${CONFIG[s].name}</span>
        <span class="text-xs font-mono text-slate-400">${covered}/${total}</span>
      </div>
      <div class="flex items-center gap-2 mb-0.5">
        <div class="flex-1 h-1.5 bg-slate-800 rounded-full overflow-hidden">
          <div class="${barColor} h-full rounded-full transition-all" style="width:${pct}%"></div>
        </div>
        <span class="text-[11px] font-mono text-slate-400 w-8 text-right">${pct}%</span>
      </div>
      <div class="text-[10px] font-mono text-slate-600 mb-2">${outstanding} outstanding · ${needsRecap} need recap</div>
      <div>${groups}</div>
    </div>`
  }).join('')
}

function renderRecap() {
  const today = todayStr()
  const items = allTopicsFlat()
    .filter(t => t.status==='covered' && t.lastCovered && daysSince(t.lastCovered)>2)
    .sort((a,b)=>(a.lastCovered<b.lastCovered)?-1:1)

  if (!items.length) {
    document.getElementById('panel-recap').innerHTML = `
      <div class="text-[10px] font-mono text-amber-400 font-bold uppercase tracking-wider mb-2">Recap Queue (0)</div>
      <div class="text-xs font-mono text-emerald-400">✓ All covered topics are up to date</div>`
    return
  }

  const rows = items.map(t => {
    const ds = daysSince(t.lastCovered)
    const urgency = ds>7 ? 'text-red-400' : ds>4 ? 'text-amber-400' : 'text-yellow-400'
    return `<div class="flex items-center gap-2 py-1 border-b border-slate-800/60 last:border-0">
      <span class="text-[10px] font-mono px-1.5 py-0.5 rounded border flex-shrink-0 ${SUBJ_BADGE[t.subj]}">${CONFIG[t.subj].abbr}</span>
      <span class="text-xs font-mono text-slate-300 flex-1 min-w-0 truncate">${t.name}</span>
      <span class="flex gap-0.5 flex-shrink-0">${confHtml(t.subj,t.id,t.conf)}</span>
      <span class="text-[10px] font-mono ${urgency} w-10 text-right flex-shrink-0">${ds}d</span>
      <button onclick="markRecapped('${t.subj}','${t.id}')" class="text-[10px] font-mono text-emerald-400 hover:text-emerald-300 flex-shrink-0 pl-1">✓</button>
    </div>`
  }).join('')

  document.getElementById('panel-recap').innerHTML = `
    <div class="text-[10px] font-mono text-amber-400 font-bold uppercase tracking-wider mb-2">Recap Queue (${items.length}) · &gt;2d rule</div>
    ${rows}`
}

function renderGaps() {
  const items = allTopicsFlat()
    .filter(t => t.status==='needs-recap' || (t.conf!=null && t.conf<=2))
    .sort((a,b)=>{
      if (a.status==='needs-recap'&&b.status!=='needs-recap') return -1
      if (b.status==='needs-recap'&&a.status!=='needs-recap') return 1
      return (a.conf||5)-(b.conf||5)
    })

  if (!items.length) {
    document.getElementById('panel-gaps').innerHTML = `
      <div class="text-[10px] font-mono text-red-400 font-bold uppercase tracking-wider mb-2">Gaps & Weaknesses (0)</div>
      <div class="text-xs font-mono text-emerald-400">✓ No weak areas flagged</div>`
    return
  }

  const rows = items.map(t => {
    const badge = t.status==='needs-recap'
      ? `<span class="text-[9px] font-mono px-1 py-0.5 rounded bg-amber-900/40 text-amber-400 border border-amber-700/40">recap</span>`
      : `<span class="text-[9px] font-mono px-1 py-0.5 rounded bg-red-900/40 text-red-400 border border-red-700/40">conf ${t.conf}</span>`
    return `<div class="flex items-center gap-2 py-1 border-b border-slate-800/60 last:border-0">
      <span class="text-[10px] font-mono px-1.5 py-0.5 rounded border flex-shrink-0 ${SUBJ_BADGE[t.subj]}">${CONFIG[t.subj].abbr}</span>
      <span class="text-xs font-mono text-slate-300 flex-1 min-w-0 truncate">${t.name}</span>
      ${t.spec?`<span class="text-[10px] font-mono text-slate-600">${t.spec}</span>`:''}
      <span class="flex gap-0.5 flex-shrink-0">${confHtml(t.subj,t.id,t.conf)}</span>
      ${badge}
      <button onclick="cycleStatus('${t.subj}','${t.id}')" class="text-[10px] font-mono text-slate-500 hover:text-slate-300 flex-shrink-0 pl-1" title="Cycle status">⟳</button>
    </div>`
  }).join('')

  document.getElementById('panel-gaps').innerHTML = `
    <div class="text-[10px] font-mono text-red-400 font-bold uppercase tracking-wider mb-2">Gaps & Weaknesses (${items.length})</div>
    ${rows}`
}

function renderPapers() {
  // Latest grade per subject
  const latestGrade = {}
  const latestScore = {}
  for (const s of SUBJ_KEYS) {
    const match = S.papers.find(p=>p.subj===s)
    if (match) { latestGrade[s]=match.grade; latestScore[s]=match.score }
  }
  const gradeCards = SUBJ_KEYS.map(s => {
    const g = latestGrade[s], sc = latestScore[s]
    return `<div class="bg-[#0A0F1E]/70 rounded-lg px-3 py-2 flex items-center justify-between">
      <span class="text-[10px] font-mono text-slate-500">${CONFIG[s].abbr}</span>
      <span class="text-sm font-mono font-bold text-blue-300">${g||'—'}</span>
      ${sc?`<span class="text-[10px] font-mono text-slate-600">${sc}</span>`:''}
    </div>`
  }).join('')

  const tableRows = S.papers.length
    ? S.papers.map(p => {
        const sName = CONFIG[p.subj]?.abbr || p.subj
        return `<tr class="border-b border-slate-800/60 hover:bg-slate-800/20">
          <td class="py-1.5 px-2 font-mono text-[11px] text-slate-400 whitespace-nowrap">${p.date}</td>
          <td class="py-1.5 px-2"><span class="text-[10px] font-mono px-1.5 py-0.5 rounded border ${SUBJ_BADGE[p.subj]||''}">${sName}</span></td>
          <td class="py-1.5 px-2 font-mono text-[11px] text-slate-300 max-w-[180px] truncate">${p.paper}</td>
          <td class="py-1.5 px-2 font-mono text-[11px] text-slate-400 text-right">${p.score||'—'}</td>
          <td class="py-1.5 px-2 font-mono text-[11px] font-bold text-blue-300 text-center">${p.grade||'—'}</td>
          <td class="py-1.5 px-1 text-right"><button onclick="deletePaper('${p.id}')" class="text-slate-700 hover:text-red-400 text-base leading-none font-mono" title="Delete">×</button></td>
        </tr>`
      }).join('')
    : `<tr><td colspan="6" class="py-3 px-2 text-xs font-mono text-slate-600 text-center">No entries yet</td></tr>`

  document.getElementById('panel-papers').innerHTML = `
    <div class="flex items-center justify-between mb-2">
      <span class="text-[10px] font-mono text-blue-400 font-bold uppercase tracking-wider">Past Papers & Essays</span>
    </div>
    <div class="grid grid-cols-3 gap-2 mb-3">${gradeCards}</div>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead><tr class="border-b border-slate-700/50">
          <th class="pb-1.5 px-2 text-[9px] font-mono text-slate-600 uppercase tracking-wider">Date</th>
          <th class="pb-1.5 px-2 text-[9px] font-mono text-slate-600 uppercase tracking-wider">Subject</th>
          <th class="pb-1.5 px-2 text-[9px] font-mono text-slate-600 uppercase tracking-wider">Paper / Question</th>
          <th class="pb-1.5 px-2 text-[9px] font-mono text-slate-600 uppercase tracking-wider text-right">Score</th>
          <th class="pb-1.5 px-2 text-[9px] font-mono text-slate-600 uppercase tracking-wider text-center">Grade</th>
          <th class="pb-1.5 px-1"></th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    <div class="mt-3 pt-3 border-t border-slate-800 flex flex-wrap gap-2 items-end">
      <input id="pf-date" type="date" class="rounded px-2 py-1 border text-xs w-32" value="${todayStr()}">
      <select id="pf-subj" class="rounded px-2 py-1 border text-xs">
        <option value="business">Business</option>
        <option value="economics">Economics</option>
        <option value="maths">Maths</option>
      </select>
      <input id="pf-paper" type="text" placeholder="Paper / question…" class="rounded px-2 py-1 border text-xs flex-1 min-w-[140px]">
      <input id="pf-score" type="text" placeholder="Score" class="rounded px-2 py-1 border text-xs w-20">
      <input id="pf-grade" type="text" placeholder="Grade" class="rounded px-2 py-1 border text-xs w-20" onkeydown="if(event.key==='Enter')addPaper()">
      <button onclick="addPaper()" class="px-3 py-1 bg-blue-600 hover:bg-blue-500 text-white text-xs font-mono font-semibold rounded transition-colors">Add</button>
    </div>`
}

function render() {
  renderCountdown()
  renderAgenda()
  renderProgress()
  renderRecap()
  renderGaps()
  renderPapers()
  document.getElementById('last-render').textContent = 'updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
}

// ── Sidebar toggle ─────────────────────────────────────
const _s=document.getElementById('sidebar'),_t=document.getElementById('sidebarToggle'),_o=document.getElementById('sidebarOverlay')
_t.addEventListener('click',()=>{const open=!_s.classList.contains('-translate-x-full');_s.classList.toggle('-translate-x-full',open);_o.classList.toggle('hidden',open);_t.setAttribute('aria-expanded',String(!open))})
_o.addEventListener('click',()=>{_s.classList.add('-translate-x-full');_o.classList.add('hidden');_t.setAttribute('aria-expanded','false')})

document.addEventListener('DOMContentLoaded', () => {
  render()
  syncFromServer()
  setInterval(syncFromServer, 30000) // re-sync every 30s so phone picks up PC changes automatically
})
</script>
</body>
</html>
